version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: password
      POSTGRES_DB: educrawl
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  crawler:
    build: .
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crawler:password@db:5432/educrawl

volumes:
  pgdata:
