<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCrawl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --card-bg:   #161b22;
      --border:    #30363d;
      --accent:    #3fb950;
      --muted:     #8b949e;
      --text:      #e6edf3;
      --yellow:    #d29922;
      --red:       #f85149;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── Mock toggle ── */
    .mock-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.85rem;
      cursor: pointer;
      user-select: none;
    }
    .mock-toggle input { display: none; }
    .toggle-track {
      width: 36px; height: 20px;
      background: var(--border);
      border-radius: 99px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: "";
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.2s, background 0.2s;
    }
    .mock-toggle input:checked + .toggle-track { background: rgba(63,185,80,0.25); }
    .mock-toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
      background: var(--accent);
    }
    .toggle-label {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .toggle-label span { color: var(--accent); }

    /* ── Layout ── */
    .container { max-width: 860px; margin: 0 auto; }

    /* ── Form card ── */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    input[type="text"],
    input[type="url"],
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--card-bg); }

    /* ── Seed URL list ── */
    #seed-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .seed-row { display: flex; gap: 0.5rem; align-items: center; }
    .seed-row input { flex: 1; }
    .btn-remove {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.45rem 0.65rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-remove:hover { color: var(--red); border-color: var(--red); }

    #add-url {
      margin-top: 0.5rem;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 0.85rem;
      transition: color 0.15s, border-color 0.15s;
    }
    #add-url:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Two-column row ── */
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 520px) { .row-2 { grid-template-columns: 1fr; } }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .btn-submit {
      flex: 1;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0d1117;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      padding: 0.7rem 1.5rem;
      transition: opacity 0.15s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-fetch {
      flex-shrink: 0;
      background: none;
      border: 1px solid #388bfd55;
      border-radius: 6px;
      color: #388bfd;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.7rem 1.1rem;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-fetch:hover:not(:disabled) { background: rgba(56,139,253,0.08); border-color: #388bfd99; }
    .btn-fetch:disabled { opacity: 0.45; cursor: not-allowed; }
    .method-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      margin-right: 0.3rem;
      vertical-align: middle;
    }
    .method-post { background: rgba(63,185,80,0.18); color: var(--accent); }
    .method-get  { background: rgba(56,139,253,0.18); color: #388bfd; }

    /* ── Spinner ── */
    #spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2.5rem 0;
    }
    #spinner.active { display: flex; }
    .ring {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #spinner p { color: var(--muted); font-size: 0.85rem; }

    /* ── Banners ── */
    .banner {
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
    }
    .banner-success {
      background: rgba(63,185,80,0.12);
      border: 1px solid rgba(63,185,80,0.35);
      color: var(--accent);
    }
    .banner-error {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.35);
      color: var(--red);
    }

    /* ── Results section ── */
    #results { margin-top: 1rem; }
    #results h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem 0;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
      animation: fadeIn 0.35s ease both;
    }
    @media (min-width: 600px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 860px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Individual card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #484f58; }

    .card-title a {
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      line-height: 1.35;
    }
    .card-title a:hover { color: var(--accent); }

    .card-domain {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .card-body {
      color: #adbac7;
      font-size: 0.78rem;
      line-height: 1.55;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.2rem;
    }

    .badge {
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.55rem;
      text-transform: uppercase;
    }
    .badge-beginner     { background: rgba(63,185,80,0.18);  color: #3fb950; }
    .badge-intermediate { background: rgba(210,153,34,0.18); color: #d29922; }
    .badge-advanced     { background: rgba(248,81,73,0.18);  color: #f85149; }

    .relevance-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      justify-content: flex-end;
    }
    .relevance-label {
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .progress-bar {
      flex: 1;
      max-width: 70px;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EduCrawl</h1>
      <p>Crawl the web and surface the best learning resources for any topic.</p>
      <label class="mock-toggle" title="Toggle mock mode">
        <input type="checkbox" id="mock-toggle" checked />
        <span class="toggle-track"></span>
        <span class="toggle-label">Mock mode <span id="mock-status">ON</span></span>
      </label>
    </header>

    <div class="form-card">
      <form id="crawl-form" novalidate>
        <!-- Seeds -->
        <div class="field">
          <label>Seed URLs</label>
          <div id="seed-list">
            <div class="seed-row">
              <input type="url" name="seed" placeholder="https://realpython.com" required />
              <button type="button" class="btn-remove" title="Remove">×</button>
            </div>
          </div>
          <button type="button" id="add-url">+ Add URL</button>
        </div>

        <!-- Topic -->
        <div class="field">
          <label for="topic">Topic</label>
          <input type="text" id="topic" name="topic" placeholder="e.g. machine learning, web development" required />
        </div>

        <!-- Level + Goal -->
        <div class="row-2">
          <div class="field">
            <label for="level">Level</label>
            <select id="level" name="level">
              <option value="beginner" selected>beginner</option>
              <option value="intermediate">intermediate</option>
              <option value="advanced">advanced</option>
            </select>
          </div>
          <div class="field">
            <label for="goal">Goal</label>
            <input type="text" id="goal" name="goal" placeholder="e.g. understand neural networks" required />
          </div>
        </div>

        <div class="btn-row">
          <button type="submit" class="btn-submit" id="submit-btn"><span class="method-tag method-post">POST</span> /crawl</button>
          <button type="button" class="btn-fetch" id="fetch-btn"><span class="method-tag method-get">GET</span> /crawl</button>
        </div>
      </form>

      <!-- Spinner -->
      <div id="spinner">
        <div class="ring"></div>
        <p>Crawling the web for resources…</p>
      </div>
    </div>

    <!-- Banners -->
    <div id="banner-area"></div>

    <!-- Results -->
    <div id="results"></div>
  </div>

  <script>
    /* ── Mock toggle ── */
    const mockToggle = document.getElementById("mock-toggle");
    const mockStatus = document.getElementById("mock-status");
    mockToggle.addEventListener("change", () => {
      mockStatus.textContent = mockToggle.checked ? "ON" : "OFF";
    });
    const USE_MOCK = () => mockToggle.checked;

    /* ── Mock data ── */
    const MOCK_RESPONSE = {
      run_id: 1,
      pages_crawled: 42,
      recommendations: [
        {
          id: 1,
          title: "Intro to Machine Learning",
          url: "https://realpython.com/tutorials/machine-learning",
          domain: "realpython.com",
          preview: "A beginner-friendly introduction to machine learning concepts, covering supervised and unsupervised learning with hands-on Python examples.",
          difficulty: "beginner",
          relevance_score: 0.95
        },
        {
          id: 2,
          title: "Neural Networks Explained",
          url: "https://towardsdatascience.com/neural-networks",
          domain: "towardsdatascience.com",
          preview: "Deep dive into how neural networks work, from perceptrons to deep learning architectures. Includes visual explanations and code samples.",
          difficulty: "intermediate",
          relevance_score: 0.89
        },
        {
          id: 3,
          title: "ML with Python: Practical Guide",
          url: "https://machinelearningmastery.com/start-here",
          domain: "machinelearningmastery.com",
          preview: "End-to-end tutorials for building machine learning models in Python using scikit-learn, covering regression, classification, and clustering.",
          difficulty: "beginner",
          relevance_score: 0.81
        },
        {
          id: 4,
          title: "Understanding Gradient Descent",
          url: "https://ruder.io/optimizing-gradient-descent",
          domain: "ruder.io",
          preview: "A comprehensive overview of gradient descent optimization algorithms and their role in training neural networks and other ML models.",
          difficulty: "advanced",
          relevance_score: 0.74
        },
        {
          id: 5,
          title: "Scikit-learn Documentation",
          url: "https://scikit-learn.org/stable/getting_started.html",
          domain: "scikit-learn.org",
          preview: "Official getting started guide for scikit-learn, the most popular Python library for machine learning with a consistent API.",
          difficulty: "intermediate",
          relevance_score: 0.68
        }
      ]
    };

    /* ── Mock API ── */
    async function mockPostCrawl() {
      await new Promise(r => setTimeout(r, 3000));
      return MOCK_RESPONSE;
    }

    async function mockGetCrawl() {
      await new Promise(r => setTimeout(r, 500));
      return MOCK_RESPONSE;
    }

    /* ── Real API ── */
    async function realPostCrawl(payload) {
      const res = await fetch("http://localhost:8000/crawl", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const data = await res.json().catch(() => null);
        throw new Error(data?.detail || `Server returned ${res.status}`);
      }
      return res.json();
    }

    async function realGetCrawl(topic, learner_level, learner_goal) {
      const params = new URLSearchParams({ topic, learner_level, learner_goal });
      const res = await fetch(`http://localhost:8000/crawl?${params}`);
      if (!res.ok) {
        const data = await res.json().catch(() => null);
        throw new Error(data?.detail || `Server returned ${res.status}`);
      }
      return res.json();
    }

    /* ── UI helpers ── */
    const seedList   = document.getElementById("seed-list");
    const addUrlBtn  = document.getElementById("add-url");
    const form       = document.getElementById("crawl-form");
    const spinner    = document.getElementById("spinner");
    const bannerArea = document.getElementById("banner-area");
    const results    = document.getElementById("results");
    const submitBtn  = document.getElementById("submit-btn");
    const fetchBtn   = document.getElementById("fetch-btn");

    function makeSeedRow(value = "") {
      const row = document.createElement("div");
      row.className = "seed-row";
      row.innerHTML = `
        <input type="url" name="seed" placeholder="https://realpython.com" value="${value}" />
        <button type="button" class="btn-remove" title="Remove">×</button>
      `;
      row.querySelector(".btn-remove").addEventListener("click", () => {
        if (seedList.children.length > 1) row.remove();
      });
      return row;
    }

    seedList.querySelector(".btn-remove").addEventListener("click", function () {
      if (seedList.children.length > 1) this.closest(".seed-row").remove();
    });

    addUrlBtn.addEventListener("click", () => seedList.appendChild(makeSeedRow()));

    function setLoading(on, spinnerMsg = "Crawling the web for resources…") {
      form.querySelectorAll("input, select, button").forEach(el => el.disabled = on);
      spinner.querySelector("p").textContent = spinnerMsg;
      spinner.classList.toggle("active", on);
      Array.from(form.children).forEach(el => {
        if (el !== spinner) el.style.display = on ? "none" : "";
      });
    }

    function showBanner(type, msg) {
      bannerArea.innerHTML = `<div class="banner banner-${type}">${msg}</div>`;
    }

    function clearBanner() { bannerArea.innerHTML = ""; }

    function getFormValues() {
      const topic = document.getElementById("topic").value.trim();
      const level = document.getElementById("level").value;
      const goal  = document.getElementById("goal").value.trim();
      return { topic, level, goal };
    }

    function truncate(str, n = 200) {
      return str.length <= n ? str : str.slice(0, n).replace(/\s\S*$/, "") + "…";
    }

    function renderResults(items, source) {
      results.innerHTML = "";
      if (!items || items.length === 0) {
        results.innerHTML = `<p class="empty-state">No resources found yet.</p>`;
        return;
      }

      const sorted = [...items].sort((a, b) => b.relevance_score - a.relevance_score);

      const heading = document.createElement("h2");
      heading.textContent = `${sorted.length} resource${sorted.length !== 1 ? "s" : ""} found`;
      results.appendChild(heading);

      const grid = document.createElement("div");
      grid.className = "cards-grid";

      sorted.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const badgeClass = {
          beginner: "badge-beginner",
          intermediate: "badge-intermediate",
          advanced: "badge-advanced"
        }[item.difficulty] || "badge-beginner";

        const pct = Math.round((item.relevance_score || 0) * 100);

        card.innerHTML = `
          <div class="card-title">
            <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
          </div>
          <div class="card-domain">${item.domain}</div>
          <div class="card-body">${truncate(item.preview || "")}</div>
          <div class="card-footer">
            <span class="badge ${badgeClass}">${item.difficulty}</span>
            <div class="relevance-wrap">
              <span class="relevance-label">${pct}%</span>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      results.appendChild(grid);
    }

    /* ── POST /crawl — crawl + return results ── */
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearBanner();
      results.innerHTML = "";

      const seedUrls = [...seedList.querySelectorAll("input[name='seed']")]
        .map(i => i.value.trim()).filter(Boolean);

      if (seedUrls.length === 0) {
        showBanner("error", "Please enter at least one seed URL.");
        return;
      }

      const { topic, level, goal } = getFormValues();
      if (!topic) { showBanner("error", "Please enter a topic."); return; }
      if (!goal)  { showBanner("error", "Please enter a learning goal."); return; }

      const payload = {
        seed_urls: seedUrls,
        topic,
        learner_level: level,
        learner_goal: goal,
        depth: 2
      };

      setLoading(true, "Crawling the web for resources…");

      try {
        const data = USE_MOCK() ? await mockPostCrawl() : await realPostCrawl(payload);
        setLoading(false);
        showBanner("success", `Crawl complete — ${data.pages_crawled} page${data.pages_crawled !== 1 ? "s" : ""} crawled. Use <strong>GET /crawl</strong> to fetch the results.`);
      } catch (err) {
        setLoading(false);
        showBanner("error", `Something went wrong: ${err.message}`);
      }
    });

    /* ── GET /crawl — fetch existing results from DB ── */
    fetchBtn.addEventListener("click", async () => {
      clearBanner();
      results.innerHTML = "";

      const { topic, level, goal } = getFormValues();
      if (!topic) { showBanner("error", "Please enter a topic."); return; }
      if (!goal)  { showBanner("error", "Please enter a learning goal."); return; }

      setLoading(true, "Fetching results from database…");

      try {
        const data = USE_MOCK()
          ? await mockGetCrawl()
          : await realGetCrawl(topic, level, goal);
        setLoading(false);
        showBanner("success", `Loaded results from a previous crawl (run #${data.run_id}).`);
        renderResults(data.recommendations);
      } catch (err) {
        setLoading(false);
        showBanner("error", `${err.message}`);
      }
    });
  </script>
</body>
</html>
